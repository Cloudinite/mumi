<!doctype html><html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><meta name="theme-color" content="#07090B"/><meta name="description" content="Mumi — I build elite websites that turn visitors into customers"/><link rel="icon" type="image/svg+xml" href="./favicon.svg"/><link rel="apple-touch-icon" href="./apple-touch-icon.svg"/><link rel="preconnect" href="https://fonts.googleapis.com"/><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/><link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/><title>Mumi — Premium Web Developer</title><link href="./static/css/main.280a54be.css" rel="stylesheet"/><script defer src="./static/js/main.8ec88cb8.js"></script><style>
/* ── Loading Screen ── */
#loader{position:fixed;inset:0;z-index:9999;background:#07090B;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .5s ease,visibility .5s ease}
#loader.hide{opacity:0;visibility:hidden;pointer-events:none}
#loader .logo-text{font-family:'Space Grotesk','Inter',sans-serif;font-weight:700;font-size:2.2rem;color:#E6EAF0;letter-spacing:-.02em;opacity:0;animation:loaderFadeUp .6s ease forwards .1s}
#loader .logo-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#22D3EE;margin-left:1px;vertical-align:baseline;margin-bottom:2px}
#loader .loader-bar{width:48px;height:3px;background:rgba(255,255,255,.06);border-radius:3px;margin-top:1.5rem;overflow:hidden;opacity:0;animation:loaderFadeUp .4s ease forwards .4s}
#loader .loader-bar-fill{width:100%;height:100%;background:#22D3EE;border-radius:3px;transform-origin:left;animation:loaderProgress 1.2s ease-in-out forwards .5s}
@keyframes loaderFadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes loaderProgress{0%{transform:scaleX(0)}100%{transform:scaleX(1)}}

/* ── Page entrance after loader ── */
#root{opacity:0;transform:translateY(8px);transition:opacity .6s ease .1s,transform .6s ease .1s}
#root.loaded{opacity:1;transform:translateY(0)}

/* ── Scroll-to-top button — ALWAYS visible ── */
#scroll-top-btn{position:fixed!important;bottom:20px!important;left:20px!important;z-index:9990!important;width:40px;height:40px;border-radius:50%;background:rgba(11,15,20,.92);border:1px solid rgba(255,255,255,.1);color:#AAB4C0;display:flex;align-items:center;justify-content:center;cursor:pointer;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);transition:color .2s,border-color .2s}
#scroll-top-btn:hover{color:#22d3ee;border-color:rgba(34,211,238,.3)}
#scroll-top-btn:active{transform:scale(.92)}
#scroll-top-btn svg{width:16px;height:16px}

/* ── Language switcher — ALWAYS fixed, next to scroll btn ── */
[data-testid="navbar-language-switcher"]{position:fixed!important;bottom:20px!important;left:68px!important;z-index:9990!important}
</style></head><body>

<!-- Loading Screen -->
<div id="loader">
  <div class="logo-text">Mumi<span class="logo-dot"></span></div>
  <div class="loader-bar"><div class="loader-bar-fill"></div></div>
</div>

<div id="root"></div>

<!-- Scroll to top button — always visible -->
<div id="scroll-top-btn" onclick="window.scrollTo({top:0,behavior:'smooth'})" aria-label="Scroll to top">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 15l-6-6-6 6"/></svg>
</div>

<script>
// Hide loader and reveal page when React mounts
var loader=document.getElementById('loader'),root=document.getElementById('root');
var obs=new MutationObserver(function(){if(root.children.length>0){root.classList.add('loaded');setTimeout(function(){loader.classList.add('hide')},200);obs.disconnect()}});
obs.observe(root,{childList:true});
setTimeout(function(){root.classList.add('loaded');loader.classList.add('hide')},3000);
</script>
</body></html>
